<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIANA LUX | Luxury Beauty House Canada</title>
<meta name="description" content="World-class luxury beauty house in Canada. Tiana Locs — loc installations, braiding, natural hair. Brows By Tiana — brows, lashes, nails, manicures.">
<meta name="keywords" content="Luxury Beauty Salon Canada, Luxury Loc Specialist Canada, Professional Braiding Services, Luxury Brows Near Me, Lash Extensions Canada, Luxury Nail Services, Beauty Studio Canada, Black Hair Specialist Canada, Loc Retwist Services Canada">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --black:#111111;--white:#faf7f2;--gold:#d4af37;--gold-dark:#b59223;--gold-light:#f3e5ab;
  --beige:#f2e9dc;--beige-dark:#eae3d2;--muted:#6b6359;--serif:'Playfair Display',Georgia,serif;
  --sans:'Montserrat',sans-serif;--ease:all .5s cubic-bezier(.25,.8,.25,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;overflow-x:hidden}
body{background:var(--white);color:var(--black);font-family:var(--sans);font-weight:300;font-size:15px;line-height:1.6}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--white)}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:3px}
h1,h2,h3,h4,h5{font-family:var(--serif);font-weight:400;letter-spacing:1.5px}
a{text-decoration:none;color:inherit;transition:var(--ease)}
img,video{max-width:100%;height:auto;object-fit:cover;display:block}

/* PRELOADER */
#preloader{position:fixed;inset:0;background:var(--black);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity 1s ease,visibility 1s}
.pre-logo{font-family:var(--serif);font-size:28px;letter-spacing:10px;color:var(--white);animation:shimmer 2s infinite}
.pre-bar{width:0;height:1px;background:var(--gold);margin:20px auto 0;animation:grow 1.5s forwards}
@keyframes shimmer{0%,100%{opacity:.4;color:var(--white)}50%{opacity:1;color:var(--gold)}}
@keyframes grow{to{width:120px}}

/* HEADER */
header{position:fixed;top:0;left:0;width:100%;z-index:1000;transition:var(--ease)}
header.scrolled{background:rgba(250,247,242,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(212,175,55,.2);box-shadow:0 4px 30px rgba(0,0,0,.05)}
.nav{max-width:1400px;margin:0 auto;padding:22px 40px;display:flex;justify-content:space-between;align-items:center;transition:var(--ease)}
header.scrolled .nav{padding:12px 40px}
.logo{font-family:var(--serif);font-size:22px;letter-spacing:6px;color:var(--white);transition:var(--ease)}
header.scrolled .logo{color:var(--black)}
.logo span{color:var(--gold)}
.nav-links{display:flex;list-style:none;gap:28px;align-items:center}
.nav-links a{font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.75);transition:var(--ease);cursor:pointer}
header.scrolled .nav-links a{color:var(--black)}
.nav-links a:hover,.nav-links a.active{color:var(--gold)!important}
.nav-book{border:1px solid var(--gold)!important;color:var(--gold)!important;padding:8px 20px}
.nav-book:hover{background:var(--gold)!important;color:var(--black)!important}
.burger{display:none;flex-direction:column;gap:5px;cursor:pointer}
.burger span{width:24px;height:1.5px;background:var(--white);transition:var(--ease);display:block}
header.scrolled .burger span{background:var(--black)}
@media(max-width:960px){
  .nav-links{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:var(--black);flex-direction:column;justify-content:center;align-items:center;gap:35px;z-index:999}
  .nav-links.open{display:flex}
  .nav-links a{font-size:16px;color:rgba(255,255,255,.8)!important}
  .burger{display:flex;z-index:1000}
}

/* BUTTONS */
.btn{display:inline-block;padding:13px 30px;font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:3px;text-transform:uppercase;cursor:pointer;border:1px solid var(--black);background:transparent;color:var(--black);position:relative;overflow:hidden;z-index:1;transition:var(--ease)}
.btn::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:var(--black);z-index:-1;transition:var(--ease)}
.btn:hover{color:var(--white)}.btn:hover::after{left:0}
.btn-gold{border-color:var(--gold);color:var(--gold)}.btn-gold::after{background:var(--gold)}.btn-gold:hover{color:var(--black)}
.btn-solid{background:var(--black);color:var(--white)}.btn-solid::after{background:var(--gold)}.btn-solid:hover{color:var(--black);border-color:var(--gold)}
.btn-w{border-color:#fff;color:#fff}.btn-w::after{background:#fff}.btn-w:hover{color:var(--black)}

/* LAYOUT */
.section{padding:90px 20px}
.container{max-width:1200px;margin:0 auto}
.section-wrap{text-align:center;margin-bottom:65px}
.subtitle{font-size:10px;font-weight:600;letter-spacing:5px;text-transform:uppercase;color:var(--gold-dark);margin-bottom:14px}
.section-title{font-size:40px;margin-bottom:18px}
.section-title::after{content:'';display:block;width:45px;height:1px;background:var(--gold);margin:14px auto 0}
.section-desc{max-width:580px;margin:0 auto;color:var(--muted);font-size:15px}

/* ── HOME PAGE ── */
.hero{height:100vh;position:relative;display:flex;align-items:center;justify-content:center;text-align:center;color:#fff;overflow:hidden}
.hero-vid{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(17,17,17,.72) 0%,rgba(17,17,17,.5) 50%,rgba(17,17,17,.82) 100%);z-index:1}
.hero-body{position:relative;z-index:2;max-width:900px;padding:0 20px;animation:fadeUp 1s .4s both}
.hero-title{font-size:64px;line-height:1.12;margin-bottom:24px;color:#fff}
.hero-title em{color:var(--gold);font-style:italic}
.hero-sub{font-size:14px;letter-spacing:1.5px;color:rgba(255,255,255,.82);margin-bottom:44px;max-width:680px;margin-left:auto;margin-right:auto}
.hero-ctas{display:flex;justify-content:center;gap:18px;flex-wrap:wrap}
.scroll-hint{position:absolute;bottom:38px;left:50%;transform:translateX(-50%);z-index:2;display:flex;flex-direction:column;align-items:center;font-size:9px;letter-spacing:3px;text-transform:uppercase;opacity:.6;color:#fff;cursor:pointer}
.scroll-line{width:1px;height:38px;background:var(--gold);margin-top:8px;animation:pulse 2s infinite}
@keyframes fadeUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}

/* STATS */
.stats-bar{background:var(--black);padding:60px 20px;border-bottom:1px solid rgba(212,175,55,.12)}
.stats-inner{max-width:1000px;margin:0 auto;display:flex;justify-content:space-around;flex-wrap:wrap;gap:40px}
.stat-num{font-family:var(--serif);font-size:46px;color:var(--gold)}
.stat-lbl{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.55);margin-top:6px}

/* ABOUT SPLIT */
.about-split{display:flex;align-items:center;gap:70px}
.about-frame{flex:1;position:relative}
.about-frame::before{content:'';position:absolute;top:18px;left:18px;right:-18px;bottom:-18px;border:1px solid var(--gold);z-index:0}
.about-frame img{position:relative;z-index:1;width:100%;height:500px;object-fit:cover}
.about-text{flex:1.2}
.about-sig{font-family:var(--serif);font-size:32px;font-style:italic;color:var(--gold-dark);margin-top:28px}
@media(max-width:900px){.about-split{flex-direction:column;gap:50px}.about-frame::before{display:none}}

/* DIVISIONS SPLIT HOVER */
.divisions{display:flex;height:580px;overflow:hidden}
.div-panel{flex:1;position:relative;overflow:hidden;cursor:pointer;transition:flex .8s cubic-bezier(.25,.8,.25,1);display:flex;align-items:center;justify-content:center;color:#fff;text-align:center}
.div-panel:hover{flex:1.5}
.div-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:transform 1.2s ease;z-index:0}
.div-panel:hover .div-bg{transform:scale(1.08)}
.div-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(17,17,17,.82),rgba(17,17,17,.42));z-index:1;transition:.8s}
.div-panel:hover .div-overlay{background:linear-gradient(135deg,rgba(17,17,17,.88),rgba(197,160,89,.18))}
.div-body{position:relative;z-index:2;padding:40px;max-width:460px;transform:translateY(16px);transition:transform .8s cubic-bezier(.25,.8,.25,1)}
.div-panel:hover .div-body{transform:translateY(0)}
.div-title{font-size:36px;color:#fff;letter-spacing:4px;margin-bottom:18px}
.div-desc{font-size:13px;color:rgba(255,255,255,.8);margin-bottom:32px;line-height:1.7;opacity:.8;transition:opacity .8s}
.div-panel:hover .div-desc{opacity:1}
@media(max-width:768px){.divisions{flex-direction:column;height:auto}.div-panel{height:320px}}

/* TRANSFORM GRID */
.t-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:36px}
.t-card{background:#fff;border:1px solid var(--beige-dark);overflow:hidden;transition:var(--ease)}
.t-card:hover{transform:translateY(-8px);box-shadow:0 18px 40px rgba(197,160,89,.1);border-color:var(--gold)}

/* BEFORE/AFTER SLIDER */
.ba-wrap{position:relative;width:100%;height:340px;overflow:hidden;user-select:none;cursor:ew-resize}
.ba-after{position:absolute;inset:0;z-index:1}.ba-after img{width:100%;height:100%;object-fit:cover}
.ba-before{position:absolute;inset:0;z-index:2;overflow:hidden;width:50%}.ba-before img{width:100%;height:100%;object-fit:cover;min-width:200%}
.ba-handle{position:absolute;top:0;bottom:0;left:50%;width:2px;background:var(--gold);z-index:10;cursor:ew-resize}
.ba-handle::after{content:'↔';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;background:var(--black);border:2px solid var(--gold);border-radius:50%;color:var(--gold);font-size:14px;display:flex;align-items:center;justify-content:center;font-weight:bold}
.ba-lbl{position:absolute;bottom:12px;background:rgba(17,17,17,.7);color:#fff;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:5px 12px;z-index:8}
.ba-lbl.l{left:12px}.ba-lbl.r{right:12px}

/* TESTIMONIALS CAROUSEL */
.testi-section{background:var(--beige)}
.testi-car{position:relative;max-width:780px;margin:0 auto;overflow:hidden}
.testi-track{display:flex;transition:transform .6s cubic-bezier(.25,.8,.25,1)}
.testi-slide{min-width:100%;padding:10px 50px;text-align:center}
.stars{color:var(--gold);font-size:18px;margin-bottom:22px}
.testi-quote{font-family:var(--serif);font-size:20px;line-height:1.8;color:var(--black);margin-bottom:28px;font-style:italic}
.testi-name{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase}
.testi-loc{font-size:9px;color:var(--muted);letter-spacing:1px;margin-top:4px}
.car-btn{position:absolute;top:50%;transform:translateY(-50%);background:none;border:none;font-size:22px;cursor:pointer;color:var(--black);padding:10px;transition:var(--ease);z-index:5}
.car-btn:hover{color:var(--gold)}
.car-btn.prev{left:0}.car-btn.next{right:0}
.car-dots{display:flex;justify-content:center;gap:10px;margin-top:36px}
.dot{width:6px;height:6px;background:rgba(0,0,0,.2);border-radius:50%;cursor:pointer;transition:var(--ease)}
.dot.active{background:var(--gold);transform:scale(1.5)}

/* FINAL CTA */
.cta-section{background:var(--black);text-align:center;padding:110px 20px;border-top:1px solid rgba(212,175,55,.12)}
.cta-section h2{color:#fff;font-size:46px;margin-bottom:22px}
.cta-section p{color:rgba(255,255,255,.65);font-size:15px;letter-spacing:1.5px;margin-bottom:42px}

/* ── SERVICES PAGE ── */
.page-hero{background:linear-gradient(rgba(17,17,17,.85),rgba(17,17,17,.85)) center/cover;padding:150px 20px 80px;text-align:center;color:#fff}
.page-hero h1{color:#fff;font-size:50px}
.page-hero p{color:rgba(255,255,255,.7);max-width:560px;margin:16px auto 0;font-size:13px;letter-spacing:1px}
.filter-row{display:flex;justify-content:center;gap:16px;margin-bottom:50px;flex-wrap:wrap}
.fbtn{background:transparent;border:1px solid var(--beige-dark);padding:9px 22px;font-family:var(--sans);font-size:10px;font-weight:600;letter-spacing:2.5px;text-transform:uppercase;cursor:pointer;transition:var(--ease)}
.fbtn:hover,.fbtn.active{background:var(--black);color:#fff;border-color:var(--black)}
.svc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:36px}
.svc-card{background:#fff;border:1px solid var(--beige-dark);display:flex;flex-direction:column;transition:var(--ease)}
.svc-card:hover{transform:translateY(-7px);box-shadow:0 18px 38px rgba(197,160,89,.08);border-color:var(--gold)}
.svc-img{position:relative;height:240px;overflow:hidden}
.svc-img img{width:100%;height:100%;object-fit:cover;transition:transform 1s ease}
.svc-card:hover .svc-img img{transform:scale(1.07)}
.svc-tag{position:absolute;top:18px;right:18px;background:var(--black);color:var(--gold);font-size:8px;font-weight:600;letter-spacing:2px;text-transform:uppercase;padding:5px 12px;z-index:3}
.svc-play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:46px;height:46px;background:rgba(17,17,17,.75);border:1px solid var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;color:var(--gold);cursor:pointer;opacity:0;transition:var(--ease);z-index:5;font-size:16px}
.svc-img:hover .svc-play{opacity:1}
.svc-play:hover{background:var(--gold);color:var(--black)}
.svc-body{padding:28px;display:flex;flex-direction:column;flex-grow:1}
.svc-name{font-size:20px;margin-bottom:10px}
.svc-desc{color:var(--muted);font-size:12px;line-height:1.7;margin-bottom:22px;flex-grow:1}
.svc-meta{display:flex;justify-content:space-between;border-top:1px solid var(--white);padding-top:18px;margin-bottom:22px;align-items:center}
.svc-dur{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px}
.svc-price{font-family:var(--serif);font-size:19px}
.svc-price small{font-family:var(--sans);font-size:9px;color:var(--muted);font-weight:300;letter-spacing:1px;margin-right:4px}
.svc-acts{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.svc-acts button{padding:11px 8px;font-size:9px;letter-spacing:1.5px}

/* ── PORTFOLIO ── */
.port-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:36px}
.port-item{background:#fff;border:1px solid var(--beige-dark);overflow:hidden;transition:var(--ease)}
.port-item:hover{transform:translateY(-7px);box-shadow:0 18px 38px rgba(197,160,89,.08);border-color:var(--gold)}
.port-info{padding:22px}
.port-cat{font-size:8px;font-weight:600;letter-spacing:4px;text-transform:uppercase;color:var(--gold-dark);margin-bottom:6px}
.port-title{font-family:var(--serif);font-size:16px;margin-bottom:6px}
.port-desc{font-size:12px;color:var(--muted)}

/* ── BOOKING WIZARD ── */
.book-wrap{max-width:860px;margin:0 auto;background:#fff;border:1px solid var(--beige-dark);border-top:3px solid var(--gold)}
.book-head{background:var(--black);color:#fff;padding:38px 40px;text-align:center}
.book-head h2{color:#fff;font-size:26px;margin-bottom:8px}
.book-steps-bar{display:flex;justify-content:space-around;padding:22px 40px;background:var(--white);border-bottom:1px solid var(--beige-dark);flex-wrap:wrap;gap:12px}
.step-ind{display:flex;align-items:center;gap:9px;font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.step-ind.active{color:var(--gold-dark)}
.step-ind.done{color:var(--black)}
.step-num{width:22px;height:22px;border-radius:50%;border:1px solid var(--muted);display:flex;align-items:center;justify-content:center;font-size:9px}
.step-ind.active .step-num{border-color:var(--gold);background:var(--gold);color:var(--black)}
.step-ind.done .step-num{border-color:var(--black);background:var(--black);color:#fff}
.book-body{padding:38px 40px}
.book-pane{display:none}.book-pane.active{display:block;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.svc-list{display:flex;flex-direction:column;gap:12px;max-height:380px;overflow-y:auto;padding-right:8px}
.svc-row{border:1px solid var(--beige-dark);padding:18px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:var(--ease)}
.svc-row:hover,.svc-row.sel{border-color:var(--gold);background:var(--white)}
.svc-row-title{font-family:var(--serif);font-size:16px;margin-bottom:4px}
.svc-row-sub{font-size:11px;color:var(--muted)}
.svc-row-price{font-family:var(--serif);font-size:17px;font-weight:500;margin-left:18px}
.cal-layout{display:grid;grid-template-columns:1.2fr .8fr;gap:26px}
@media(max-width:640px){.cal-layout{grid-template-columns:1fr}}
.cal-box{border:1px solid var(--beige-dark);padding:20px;background:#fff}
.cal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.cal-title{font-family:var(--serif);font-size:17px}
.cal-arrow{background:none;border:none;font-size:18px;cursor:pointer;color:var(--black)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;text-align:center}
.cal-dh{font-size:9px;font-weight:600;color:var(--muted);padding:4px 0;text-transform:uppercase}
.cal-d{padding:9px 0;font-size:12px;cursor:pointer;transition:var(--ease);border-radius:2px}
.cal-d:hover:not(.dis){background:var(--beige)}
.cal-d.sel{background:var(--gold);color:var(--black);font-weight:600}
.cal-d.dis{color:rgba(0,0,0,.15);cursor:not-allowed}
.slots-box{border:1px solid var(--beige-dark);padding:18px;background:#fff}
.slots-title{font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:14px;border-bottom:1px solid var(--white);padding-bottom:8px}
.slots-grid{display:flex;flex-direction:column;gap:8px;max-height:240px;overflow-y:auto}
.slot-btn{border:1px solid var(--beige-dark);background:transparent;padding:10px;font-family:var(--sans);font-size:11px;cursor:pointer;transition:var(--ease)}
.slot-btn:hover:not(.dis),.slot-btn.sel{border-color:var(--black);background:var(--black);color:#fff}
.slot-btn.dis{opacity:.3;cursor:not-allowed}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.fg{display:flex;flex-direction:column;gap:7px}
.fg.full{grid-column:span 2}
.fg label{font-size:10px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
.fg input,.fg textarea,.fg select{border:1px solid var(--beige-dark);padding:11px 14px;font-family:var(--sans);font-size:13px;background:var(--white);transition:var(--ease)}
.fg input:focus,.fg textarea:focus,.fg select:focus{outline:none;border-color:var(--gold);background:#fff}
@media(max-width:640px){.form-grid{grid-template-columns:1fr}.fg.full{grid-column:span 1}}
.summary-box{border:1px solid var(--gold);background:var(--white);padding:28px;margin-bottom:28px}
.sum-title{font-family:var(--serif);font-size:20px;border-bottom:1px solid rgba(212,175,55,.2);padding-bottom:14px;margin-bottom:18px}
.sum-row{display:flex;justify-content:space-between;margin-bottom:11px;font-size:13px}
.sum-row.total{border-top:1px solid rgba(212,175,55,.2);padding-top:14px;margin-top:14px;font-size:17px;font-weight:600}
.sum-lbl{color:var(--muted)}.sum-val{font-weight:500}
.book-nav{display:flex;justify-content:space-between;margin-top:36px}
.cat-filter-row{display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap}

/* ── PAYMENT ── */
.pay-wrap{max-width:480px;margin:0 auto;background:#fff;border:1px solid var(--beige-dark);padding:38px;box-shadow:0 10px 30px rgba(0,0,0,.04)}
.pay-tabs{display:flex;justify-content:space-around;margin-bottom:28px;border-bottom:1px solid var(--white);padding-bottom:14px}
.pay-tab{font-size:10px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);cursor:pointer;padding:6px 12px;transition:var(--ease)}
.pay-tab.active{color:var(--gold-dark);border-bottom:2px solid var(--gold)}
.card-mock{background:linear-gradient(135deg,#1f1f1f,#0d0d0d);border:1px solid rgba(212,175,55,.3);border-radius:12px;padding:24px;color:#fff;height:180px;display:flex;flex-direction:column;justify-content:space-between;margin-bottom:28px;position:relative;overflow:hidden}
.card-mock::before{content:'';position:absolute;width:180px;height:180px;background:radial-gradient(circle,rgba(212,175,55,.06) 0%,transparent 70%);top:-40px;right:-40px}
.chip{width:36px;height:26px;background:linear-gradient(135deg,#f2e0a2,#b89330);border-radius:4px}
.card-num-mock{font-family:monospace;font-size:17px;letter-spacing:3px;margin:12px 0}

/* ── BEFORE/AFTER SLIDER ── */
function initBA(){
  document.querySelectorAll('.ba-wrap').forEach(wrap=>{
    const handle=wrap.querySelector('.ba-handle');
    const before=wrap.querySelector('.ba-before');
    let dragging=false;
    function setPos(x){
      const r=wrap.getBoundingClientRect();
      let p=((x-r.left)/r.width)*100;
      p=Math.max(0,Math.min(100,p));
      before.style.width=p+'%';
      handle.style.left=p+'%';
    }
    handle.addEventListener('mousedown',e=>{dragging=true;e.preventDefault();});
    window.addEventListener('mouseup',()=>dragging=false);
    window.addEventListener('mousemove',e=>{if(dragging)setPos(e.clientX);});
    handle.addEventListener('touchstart',()=>dragging=true,{passive:true});
    window.addEventListener('touchend',()=>dragging=false);
    window.addEventListener('touchmove',e=>{if(dragging&&e.touches[0])setPos(e.touches[0].clientX);},{passive:true});
    before.style.width='50%';handle.style.left='50%';
  });
}

function filterBlog(cat){
  document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));

  document.querySelectorAll('.blog-card').forEach(c=>{c.style.display=(cat==='all'||c.dataset.cat===cat)?'flex':'none';});
}
function renderArticle(id){

}

/* ── BOOKING LOGIC ── */
let bkState={step:1,svcId:null,svcName:'',price:0,dep:0,dur:'',date:null,time:null};
let calYear=2026,calMonth=5;
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
const TIMES=['09:00 AM','10:30 AM','12:00 PM','01:30 PM','03:00 PM','04:30 PM','06:00 PM'];

function initBooking(preselectId){
  // Pre-fill client info
  const c=dbGetClient();
  const n=document.getElementById('bk-name'),p=document.getElementById('bk-phone'),em=document.getElementById('bk-email');
  if(n)n.value=c.name||'';if(p)p.value=c.phone||'';if(em)em.value=c.email||'';
  // Validate form fields on input
  ['bk-name','bk-phone','bk-email'].forEach(id=>{const el=document.getElementById(id);if(el)el.addEventListener('input',checkClientForm);});
  renderCal();
  if(preselectId){
    const row=document.querySelector(`.svc-row[data-id="${preselectId}"]`);
    if(row){
      const cat=preselectId.startsWith('b')?'brows':'locs';
      if(cat==='brows')document.querySelectorAll('.cat-filter-row .fbtn').forEach((b,i)=>{b.classList.toggle('active',i===1);});
      switchSvcCat(cat,document.querySelectorAll('.cat-filter-row .fbtn')[preselectId.startsWith('b')?1:0]);
      selectSvc(row);
    }
  }
}
function switchSvcCat(cat,btn){
  document.querySelectorAll('.cat-filter-row .fbtn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  document.getElementById('svc-list-locs').classList.toggle('hidden',cat==='brows');
  document.getElementById('svc-list-brows').classList.toggle('hidden',cat==='locs');
  bkState.svcId=null;updateBkNext();
}
function selectSvc(el){
  document.querySelectorAll('.svc-row').forEach(r=>r.classList.remove('sel'));
  el.classList.add('sel');
  bkState.svcId=el.dataset.id;bkState.svcName=el.dataset.name;bkState.price=parseFloat(el.dataset.price);bkState.dep=parseFloat(el.dataset.dep);bkState.dur=el.dataset.dur;
  updateBkNext();
}
function updateBkNext(){
  const btn=document.getElementById('bk-next');if(!btn)return;
  if(bkState.step===1){btn.disabled=!bkState.svcId;btn.textContent=bkState.svcId?'Next: Choose Date & Time →':'Select a Service First';}
  if(bkState.step===2){btn.disabled=!(bkState.date&&bkState.time);btn.textContent=bkState.date&&bkState.time?'Next: Enter Your Details →':'Choose a Date & Time';}
  if(bkState.step===3){checkClientForm();}
  if(bkState.step===4){btn.disabled=false;btn.textContent='Confirm & Pay Deposit';}
}
function checkClientForm(){
  const btn=document.getElementById('bk-next');if(!btn||bkState.step!==3)return;
  const ok=document.getElementById('bk-name')?.value.trim()&&document.getElementById('bk-phone')?.value.trim()&&document.getElementById('bk-email')?.value.trim();
  btn.disabled=!ok;btn.textContent=ok?'Next: Review Booking →':'Fill Required Fields';
}
function renderCal(){
  const grid=document.getElementById('cal-grid');const title=document.getElementById('cal-title');
  if(!grid||!title)return;
  title.textContent=MONTHS[calMonth]+' '+calYear;
  grid.innerHTML='';
  ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d=>{const h=document.createElement('div');h.className='cal-dh';h.textContent=d;grid.appendChild(h);});
  const first=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const today=new Date(2026,5,18);
  for(let i=0;i<first;i++){grid.appendChild(document.createElement('div'));}
  for(let d=1;d<=days;d++){
    const cell=document.createElement('div');cell.className='cal-d';cell.textContent=d;
    const dt=new Date(calYear,calMonth,d);
    if(dt<today){cell.classList.add('dis');}else{
      if(bkState.date&&bkState.date.getDate()===d&&bkState.date.getMonth()===calMonth&&bkState.date.getFullYear()===calYear)cell.classList.add('sel');
      cell.onclick=()=>{bkState.date=new Date(calYear,calMonth,d);bkState.time=null;renderCal();renderSlots();};
    }
    grid.appendChild(cell);
  }
}
function shiftCal(dir){calMonth+=dir;if(calMonth<0){calMonth=11;calYear--;}if(calMonth>11){calMonth=0;calYear++;}renderCal();}
function renderSlots(){
  const g=document.getElementById('slots-grid');if(!g||!bkState.date)return;
  const dateStr=bkState.date.toISOString().split('T')[0];
  const booked=dbGetBookings().filter(b=>b.date===dateStr&&b.status!=='Cancelled').map(b=>b.time);
  g.innerHTML='';
  TIMES.forEach(t=>{
    const btn=document.createElement('button');btn.className='slot-btn';btn.textContent=t;
    if(booked.includes(t)){btn.classList.add('dis');btn.disabled=true;}
    else{if(bkState.time===t)btn.classList.add('sel');btn.onclick=()=>{bkState.time=t;renderSlots();updateBkNext();};}
    g.appendChild(btn);
  });
  updateBkNext();
}
function fillSummary(){
  document.getElementById('sum-svc').textContent=bkState.svcName;
  document.getElementById('sum-dur').textContent=bkState.dur;
  const opts={weekday:'long',year:'numeric',month:'long',day:'numeric'};
  document.getElementById('sum-date').textContent=bkState.date.toLocaleDateString('en-US',opts);
  document.getElementById('sum-time').textContent=bkState.time;
  document.getElementById('sum-price').textContent='$'+bkState.price.toFixed(2)+' CAD';
  document.getElementById('sum-dep').textContent='$'+bkState.dep.toFixed(2)+' CAD';
}
function bookStep(dir){
  const max=4;const min=1;const next=bkState.step+dir;
  if(next<min||next>max)return;
  document.getElementById('bp'+bkState.step).classList.remove('active');
  document.getElementById('si'+bkState.step).classList.remove('active');
  if(dir>0)document.getElementById('si'+bkState.step).classList.add('done');
  else document.getElementById('si'+next).classList.remove('done');
  bkState.step=next;
  document.getElementById('bp'+bkState.step).classList.add('active');
  document.getElementById('si'+bkState.step).classList.add('active');
  const back=document.getElementById('bk-back');if(back)back.style.visibility=bkState.step>1?'visible':'hidden';
  if(bkState.step===4)fillSummary();
  if(bkState.step===4){
    const btn=document.getElementById('bk-next');
    btn.textContent='Confirm & Pay Deposit';btn.disabled=false;
    btn.onclick=()=>{
      sessionStorage.setItem('tl_pending',JSON.stringify({svcId:bkState.svcId,svcName:bkState.svcName,price:bkState.price,dep:bkState.dep,date:bkState.date.toISOString().split('T')[0],time:bkState.time,clientName:document.getElementById('bk-name').value,clientEmail:document.getElementById('bk-email').value,clientPhone:document.getElementById('bk-phone').value,notes:document.getElementById('bk-notes').value}));
      toast('Opening checkout...','ok');setTimeout(()=>goTo('payment'),700);
    };
  }else{updateBkNext();}
}

    </div>
    <div>
      <div class="foot-title">Newsletter</div>
      <p style="color:rgba(255,255,255,.55);font-size:12px;margin-bottom:16px;line-height:1.7">Subscribe for exclusive promotions, beauty tips and booking alerts.</p>
      <form class="nl-form" onsubmit="nlSignup(event)">
        <input class="nl-input" type="email" id="nl-email" placeholder="Your email address" required>
        <button type="submit" class="nl-btn">Join</button>
      </form>
    </div>
  </div>
  <div class="foot-bottom">
    <div class="foot-tag">Experience Luxury. Experience Tiana Lux.</div>
    <div>© 2026 TIANA LUX Beauty House. All Rights Reserved.</div>
  </div>`;
}
function nlSignup(e){e.preventDefault();const em=document.getElementById('nl-email');if(em){toast('Welcome! '+em.value+' has been added to the Tiana Lux VIP list.','ok');em.value='';}}

/* ── HEADER SCROLL ── */
window.addEventListener('scroll',()=>{document.getElementById('site-header').classList.toggle('scrolled',window.scrollY>50);});

/* ── BURGER MENU ── */
function closeMenu(){document.getElementById('nav-links').classList.remove('open');document.getElementById('burger').classList.remove('open');}
document.getElementById('burger').addEventListener('click',()=>{
  document.getElementById('nav-links').classList.toggle('open');
  document.getElementById('burger').classList.toggle('open');
});

/* ── BOOT ── */
document.addEventListener('DOMContentLoaded',()=>{
  renderFooter();
  goTo('home');
  setTimeout(()=>{
    const pre=document.getElementById('preloader');
    pre.style.opacity='0';
    setTimeout(()=>pre.style.display='none',900);
  },1100);
});
</script>
