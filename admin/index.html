<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tiana Lux Content Manager</title>
</head>
<body>
  <div id="nc-root"></div>
  <h1 id="loading-msg" style="text-align:center; margin-top: 50px; font-family: sans-serif;">Loading Admin Panel...</h1>
  <script>
    // Remove the loading message once the CMS script loads
    window.onload = function() {
      setTimeout(() => {
        const msg = document.getElementById('loading-msg');
        if(msg) msg.style.display = 'none';
      }, 3000);
    }
  </script>
  <!-- Include the script that builds the page and powers Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.1.2/dist/decap-cms.js"></script>
</body>
</html>
